<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nur arif souvenir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .register-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 0.8rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 0.8rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <a href="index.html" class="logo">🛒 NURARIF SOUVENIR</a>
        <h2>Masuk ke Akun Anda</h2>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Masukkan email Anda">
            </div>

            <div class="input-group">
                <label for="password">Kata Sandi:</label>
                <input type="password" id="password" name="password" required placeholder="Masukkan kata sandi Anda">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Login</button>
        </form>

        <div class="register-link">
            Belum punya akun? <a href="register.html">Daftar Sekarang</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Reset pesan
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validasi input
            if (!emailInput || !passwordInput) {
                showError('Harap isi semua kolom!');
                return;
            }

            // Disable tombol saat proses
            loginBtn.disabled = true;
            loginBtn.textContent = 'Memproses...';

            // Panggil API Login
            fetch('http://localhost/nurarifsouvenir/api_login.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: emailInput,
                    password: passwordInput
                }),
            })
                .then(response => {
                    // Cek apakah response OK (status 200-299)
                    if (!response.ok) {
                        return response.json().then(data => {
                            throw new Error(data.message || 'Login gagal');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        // LOGIN BERHASIL
                        showSuccess(data.message);

                        // Simpan data user ke localStorage
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userId', data.user_id);
                        localStorage.setItem('userName', data.name);
                        localStorage.setItem('userEmail', emailInput);

                        // Redirect ke index.html setelah 1 detik
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);

                    } else {
                        // LOGIN GAGAL
                        showError(data.message || 'Email atau kata sandi salah');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Login';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError(error.message || 'Terjadi kesalahan koneksi. Pastikan XAMPP berjalan dan database sudah dibuat.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                });
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
        }

        // Cek apakah sudah login
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
