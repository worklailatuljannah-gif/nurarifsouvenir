<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - ElectroShop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .btn-register {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.3s;
        }

        .btn-register:hover {
            opacity: 0.9;
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 0.8rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 0.8rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .password-strength {
            font-size: 0.85rem;
            margin-top: 0.25rem;
            color: #666;
        }

        .password-strength.weak {
            color: #ff4757;
        }

        .password-strength.medium {
            color: #ffa502;
        }

        .password-strength.strong {
            color: #2ecc71;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <a href="index.html" class="logo">🛒 NurArif Souvenir</a>
        <h2>Buat Akun Baru</h2>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="input-group">
                <label for="name">Nama Lengkap:</label>
                <input type="text" id="name" name="name" required placeholder="Masukkan nama Anda" minlength="3">
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Masukkan email yang valid">
            </div>

            <div class="input-group">
                <label for="password">Kata Sandi:</label>
                <input type="password" id="password" name="password" required placeholder="Minimal 6 karakter"
                    minlength="6" oninput="checkPasswordStrength()">
                <div class="password-strength" id="passwordStrength"></div>
            </div>

            <div class="input-group">
                <label for="confirm-password">Konfirmasi Kata Sandi:</label>
                <input type="password" id="confirm-password" name="confirm-password" required
                    placeholder="Ulangi kata sandi" minlength="6">
            </div>

            <button type="submit" class="btn-register" id="registerBtn">Daftar Sekarang</button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html">Login di sini</a>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const registerBtn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Reset pesan
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validasi Input
            if (!name || !email || !password || !confirmPassword) {
                showError('Semua kolom harus diisi!');
                return;
            }

            if (name.length < 3) {
                showError('Nama minimal 3 karakter!');
                return;
            }

            if (password.length < 6) {
                showError('Kata sandi minimal 6 karakter!');
                return;
            }

            if (password !== confirmPassword) {
                showError('Konfirmasi kata sandi tidak cocok!');
                return;
            }

            // Disable tombol saat proses
            registerBtn.disabled = true;
            registerBtn.textContent = 'Memproses...';

            // Kirim data ke API Register
            fetch('http://localhost/nurarifsouvenir/api_register.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    password: password
                }),
            })
                .then(response => {
                    // Cek status response
                    if (!response.ok) {
                        return response.json().then(data => {
                            throw new Error(data.message || 'Pendaftaran gagal');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        // REGISTRASI BERHASIL
                        showSuccess(data.message + ' Anda akan dialihkan ke halaman login...');

                        // Reset form
                        document.getElementById('registerForm').reset();
                        document.getElementById('passwordStrength').textContent = '';

                        // Redirect ke login setelah 2 detik
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);

                    } else {
                        // REGISTRASI GAGAL
                        showError(data.message || 'Pendaftaran gagal. Silakan coba lagi.');
                        registerBtn.disabled = false;
                        registerBtn.textContent = 'Daftar Sekarang';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError(error.message || 'Terjadi kesalahan koneksi. Pastikan XAMPP berjalan dan database sudah dibuat.');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Daftar Sekarang';
                });
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (password.length === 0) {
                strengthDiv.textContent = '';
                strengthDiv.className = 'password-strength';
                return;
            }

            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                strengthDiv.textContent = '⚠️ Lemah';
                strengthDiv.className = 'password-strength weak';
            } else if (strength <= 3) {
                strengthDiv.textContent = '⚡ Sedang';
                strengthDiv.className = 'password-strength medium';
            } else {
                strengthDiv.textContent = '✅ Kuat';
                strengthDiv.className = 'password-strength strong';
            }
        }

        // Cek apakah sudah login
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
